<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Guerrero AR Controlable</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#000;
               font-family: system-ui, -apple-system, sans-serif; touch-action: none; }
  #camera-feed { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  #three-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:1; }
  #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
             color:#fff; font-size:15px; z-index:10; background:rgba(0,0,0,.5); }

  .ctrl-layer { position:fixed; inset:0; z-index:5; pointer-events:none; }
  .dpad { position:absolute; left:18px; bottom:26px; width:150px; height:150px;
          display:grid; grid-template-columns:48px 48px 48px; grid-template-rows:48px 48px 48px;
          gap:3px; pointer-events:auto; }
  .dpad button { grid-column:auto; background:rgba(20,22,28,0.55); border:1px solid rgba(255,255,255,0.25);
                 border-radius:10px; color:#fff; font-size:20px; backdrop-filter: blur(4px);
                 -webkit-user-select:none; user-select:none; touch-action:none; }
  .dpad button:active, .dpad button.active { background:rgba(29,140,248,0.75); }
  #btn-up   { grid-column:2; grid-row:1; }
  #btn-left { grid-column:1; grid-row:2; }
  #btn-right{ grid-column:3; grid-row:2; }
  #btn-down { grid-column:2; grid-row:3; }

  #btn-attack {
    position:absolute; right:24px; bottom:36px; width:88px; height:88px; border-radius:50%;
    background:rgba(220,40,40,0.75); border:2px solid rgba(255,255,255,0.5); color:#fff;
    font-size:13px; font-weight:600; pointer-events:auto; backdrop-filter: blur(4px);
    -webkit-user-select:none; user-select:none; touch-action:none;
  }
  #btn-attack:active { background:rgba(255,60,60,0.95); transform:scale(0.95); }

  .topbar { position:absolute; top:14px; left:0; right:0; text-align:center; color:#eee;
            font-size:12.5px; opacity:0.85; pointer-events:none; text-shadow:0 1px 3px #000; }
</style>
</head>
<body>

<video id="camera-feed" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>
<div id="loading">Cargando guerrero...</div>

<div class="ctrl-layer">
  <div class="topbar">Usá el D-pad para mover y el botón rojo para atacar ⚔️</div>
  <div class="dpad">
    <button id="btn-up">▲</button>
    <button id="btn-left">◀</button>
    <button id="btn-right">▶</button>
    <button id="btn-down">▼</button>
  </div>
  <button id="btn-attack">ATACAR</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ---------- Camara de fondo (passthrough) ----------
const video = document.getElementById('camera-feed');
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio:false })
  .then(stream => { video.srcObject = stream; })
  .catch(err => { console.warn('No se pudo acceder a la camara:', err); });

// ---------- Escena Three.js ----------
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3.2);
camera.lookAt(0, 0.9, 0);

const hemi = new THREE.HemisphereLight(0xffffff, 0x444455, 1.2);
scene.add(hemi);
const dir = new THREE.DirectionalLight(0xffffff, 1.4);
dir.position.set(2, 4, 3);
scene.add(dir);

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(1.4, 32),
  new THREE.MeshStandardMaterial({ color: 0x222222, transparent:true, opacity:0.18 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ---------- Carga del guerrero ----------
let mixer, actions = {}, currentAction, character;
const moveState = { up:false, down:false, left:false, right:false };
const SPEED = 0.9; // m/s
const clock = new THREE.Clock();
let attacking = false;

const loader = new GLTFLoader();
loader.load('guerrero.glb', (gltf) => {
  character = gltf.scene;
  character.position.set(0,0,0);
  scene.add(character);

  mixer = new THREE.AnimationMixer(character);
  gltf.animations.forEach(clip => {
    actions[clip.name] = mixer.clipAction(clip);
  });

  actions['Atacar'].setLoop(THREE.LoopOnce);
  actions['Atacar'].clampWhenFinished = true;

  playAction('Idle');
  document.getElementById('loading').style.display = 'none';

  mixer.addEventListener('finished', (e) => {
    if (e.action === actions['Atacar']) {
      attacking = false;
      const next = isMoving() ? 'Caminar' : 'Idle';
      playAction(next);
    }
  });
});

function isMoving() {
  return moveState.up || moveState.down || moveState.left || moveState.right;
}

function playAction(name, fade=0.2) {
  if (!actions[name] || currentAction === actions[name]) return;
  const next = actions[name];
  if (currentAction) currentAction.fadeOut(fade);
  next.reset().fadeIn(fade).play();
  currentAction = next;
}

// ---------- Control D-pad ----------
function bindHold(id, key) {
  const el = document.getElementById(id);
  const set = (v) => (e) => {
    e.preventDefault();
    moveState[key] = v;
    el.classList.toggle('active', v);
    if (!attacking) playAction(isMoving() ? 'Caminar' : 'Idle');
  };
  el.addEventListener('pointerdown', set(true));
  el.addEventListener('pointerup', set(false));
  el.addEventListener('pointerleave', set(false));
  el.addEventListener('pointercancel', set(false));
}
bindHold('btn-up', 'up');
bindHold('btn-down', 'down');
bindHold('btn-left', 'left');
bindHold('btn-right', 'right');

document.getElementById('btn-attack').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (!actions['Atacar']) return;
  attacking = true;
  playAction('Atacar', 0.05);
});

// ---------- Loop ----------
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (mixer) mixer.update(dt);

  if (character && !attacking) {
    let dx=0, dz=0;
    if (moveState.up) dz -= 1;
    if (moveState.down) dz += 1;
    if (moveState.left) dx -= 1;
    if (moveState.right) dx += 1;
    if (dx!==0 || dz!==0) {
      const len = Math.hypot(dx,dz);
      dx/=len; dz/=len;
      character.position.x += dx*SPEED*dt;
      character.position.z += dz*SPEED*dt;
      const targetAngle = Math.atan2(dx, dz);
      character.rotation.y += (targetAngle - character.rotation.y) * Math.min(1, dt*8);
    }
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
