<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personaje AR</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; background:#0e0f12; font-family: system-ui, sans-serif; }
  model-viewer {
    width: 100%;
    height: 100vh;
    --poster-color: transparent;
    background-color: #0e0f12;
  }
  .hint {
    position: absolute;
    bottom: 14px;
    left: 0; right: 0;
    text-align: center;
    color: #cfd3da;
    font-size: 13px;
    opacity: 0.8;
    pointer-events: none;
  }
</style>
</head>
<body>

<model-viewer
  src="personaje_caminando.glb"
  alt="Personaje 3D animado caminando"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  auto-rotate
  autoplay
  animation-name="Idle_HMI"
  shadow-intensity="1"
  exposure="1.1"
  environment-image="neutral"
  camera-orbit="0deg 75deg 2.2m"
  min-camera-orbit="auto auto 1m"
  max-camera-orbit="auto auto 5m"
>
  <button slot="ar-button" style="
    background-color:#1d8cf8; color:white; border:none; border-radius:8px;
    padding:10px 16px; font-size:14px; position:absolute; bottom:24px; right:16px;
    box-shadow:0 2px 8px rgba(0,0,0,.3);">
    Ver en mi espacio (AR) 📷
  </button>
</model-viewer>

<div class="hint">Tocá "Ver en mi espacio" desde el celular para abrir la cámara en AR</div>

</body>
</html>
